steps:
# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/icp-agent-api:$COMMIT_SHA', './backend']
  
# Push the container image to Container Registry
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/icp-agent-api:$COMMIT_SHA']

# Deploy container image to Cloud Run
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - 'run'
  - 'deploy'
  - 'icp-agent-api'
  - '--image'
  - 'gcr.io/$PROJECT_ID/icp-agent-api:$COMMIT_SHA'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'
  - '--set-env-vars'
  - 'APP_ENV=production,WORKERS=1'

images:
- 'gcr.io/$PROJECT_ID/icp-agent-api:$COMMIT_SHA'
