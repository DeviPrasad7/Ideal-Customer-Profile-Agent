services:
  postgres:
    image: postgres:15-alpine
    container_name: icp-postgres
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agentic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentic"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: icp-agent-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src          # hot‑reload source in dev
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
    environment:
      - APP_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      # Single worker required: PubSub, CircuitBreaker, and TriggerMonitor
      # are all in-process. Multi-worker would cause duplicate polling and
      # missing SSE events. Switch to Redis-backed variants for multi-worker.
      - WORKERS=1
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000   # points to the backend container
    depends_on:
      - api
    restart: unless-stopped
volumes:
  postgres_data:
